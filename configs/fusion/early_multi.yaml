model:
  type: early_fusion
  num_classes: 5
  pretrained: bert-base-uncased
  max_length: 128
  image_size: 224
  hidden_units: 512
  dropout: 0.5
  trainable_bert: true
  fine_tuned_vgg: true

data:
  tsv_path: data/top5_memes_tidy.tsv
  binary_classes: null
  batch_size: 32
  val_size: 0.1
  test_size: 0.25
  seed: 15

training:
  optimizer: adam
  learning_rate: 3.0e-5
  epochs: 10
  early_stopping_patience: 3
  verbose: 2
